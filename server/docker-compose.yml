version: '3.8'

services:
  poker-server:
    build: .
    container_name: dz-poker-server
    ports:
      - "8080:8080"  # WebSocket + HTTP 端口
    volumes:
      - ./data:/app/data  # 持久化数据库
    environment:
      - GIN_MODE=release
      - WS_PORT=8080
      - DB_PATH=/app/data/dz-poker.db
      - TZ=Asia/Shanghai
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3